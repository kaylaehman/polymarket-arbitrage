# Polymarket Arbitrage Bot Configuration
# ========================================

api:
  # Polymarket API endpoints
  polymarket_rest_url: "https://clob.polymarket.com"
  polymarket_ws_url: "wss://ws-subscriptions-clob.polymarket.com/ws/market"
  gamma_api_url: "https://gamma-api.polymarket.com"
  
  # Kalshi API endpoint (public, no auth needed for market data)
  kalshi_api_url: "https://api.elections.kalshi.com/trade-api/v2"
  
  # Authentication (replace with your credentials)
  api_key: "YOUR_API_KEY_HERE"
  api_secret: "YOUR_API_SECRET_HERE"
  passphrase: "YOUR_PASSPHRASE_HERE"
  
  # Wallet configuration
  private_key: "YOUR_PRIVATE_KEY_HERE"
  
  # Request settings
  timeout_seconds: 30
  max_retries: 3
  retry_delay_seconds: 1

trading:
  # Markets to trade (empty list = auto-discover active markets)
  markets: []
  
  # Arbitrage settings
  min_edge: 0.01           # 1% edge required for bundle arbitrage
  bundle_arb_enabled: true
  
  # Market-making settings
  min_spread: 0.05         # 5c spread to act as market maker
  tick_size: 0.01          # Minimum price increment
  mm_enabled: false        # Disabled for real data (markets too efficient)
  
  # Order sizing - SMALL for $50 budget
  default_order_size: 5    # $5 per order
  min_order_size: 2        # $2 minimum
  max_order_size: 10       # $10 max per order
  
  # Execution settings
  slippage_tolerance: 0.02  # Max allowed slippage from signal to execution
  order_timeout_seconds: 60 # Cancel unfilled orders after this time

  # Kelly criterion sizing (FEAT-05) — keep false until FEAT-09 signal data
  # confirms the AI's probabilities are calibrated (miscalibrated + Kelly = ruin)
  kelly_enabled: false
  kelly_fraction: 0.25       # quarter-Kelly for reduced variance
  kelly_max_fraction: 0.10   # never risk >10% of bankroll on one market

  # Time-decay edge discounting (FEAT-07)
  time_decay_enabled: false
  skip_if_resolves_within_hours: 12   # hard skip regardless of edge
  
  # Fees (Polymarket rates - conservative estimates)
  maker_fee_bps: 0          # 0% for maker (limit orders adding liquidity)
  taker_fee_bps: 150        # 1.5% for taker (taking liquidity)
  estimated_gas_per_order: 0.02  # ~$0.02 gas on Polygon

risk:
  # Position limits - CONSERVATIVE for $50 budget
  max_position_per_market: 15    # Max $15 per market
  max_global_exposure: 50        # Max $50 total (your starting amount!)
  
  # Loss limits - tight stops
  max_daily_loss: 10             # Stop if losing $10/day
  max_drawdown_pct: 0.15         # 15% max drawdown from peak
  
  # Market filters - DISABLED for testing (volume data comes from Gamma API)
  trade_only_high_volume: false   # Disabled - we verify via Gamma API instead
  min_24h_volume: 10000           # Minimum 24h volume
  
  # Market whitelist/blacklist (optional)
  whitelist: []                  # If non-empty, only trade these markets
  blacklist: []                  # Never trade these markets
  
  # Kill switch
  kill_switch_enabled: true
  auto_unwind_on_breach: false

mode:
  # Trading mode: "live" or "dry_run"
  trading_mode: "dry_run"
  
  # Data mode: "real" or "simulation"
  # - "real": Fetch actual order books from Polymarket CLOB API
  # - "simulation": Generate fake data with opportunities (for demos/screenshots)
  data_mode: "real"  # <-- CHANGE TO "simulation" FOR DEMOS
  
  # Cross-platform arbitrage (Polymarket + Kalshi)
  cross_platform_enabled: true    # Enable cross-platform arbitrage detection
  kalshi_enabled: true            # Enable Kalshi market monitoring
  min_match_similarity: 0.6       # Minimum similarity score for market matching (0-1)
  
  # Dry run settings
  dry_run_initial_balance: 10000
  simulate_fills: true
  fill_probability: 0.8          # Probability of order being filled in dry run

logging:
  # Log levels: DEBUG, INFO, WARNING, ERROR, CRITICAL
  console_level: "INFO"
  file_level: "DEBUG"
  
  # Log files
  log_dir: "logs"
  main_log_file: "bot.log"
  trades_log_file: "trades.log"
  opportunities_log_file: "opportunities.log"
  
  # Log rotation
  max_log_size_mb: 50
  backup_count: 5

monitoring:
  # Portfolio snapshot interval (seconds)
  snapshot_interval: 60

  # Heartbeat interval (seconds)
  heartbeat_interval: 30

  # Performance metrics
  track_latency: true
  track_fill_rates: true

# ── Intelligence Layer ────────────────────────────────────────────────────────
# AI news-reading layer. Disabled by default — the bot runs fully without it.
# When enabled, set NEWSAPI_KEY and ANTHROPIC_API_KEY (and optionally
# ANTHROPIC_BASE_URL for the OpenClaw proxy) as environment variables.
# Phase 2 is "annotate-only": signals are attached/logged, never block a trade.
intelligence:
  enabled: false              # Set true once NEWSAPI_KEY and ANTHROPIC_API_KEY are set
  mode: "filter"              # "filter" | "boost" | "both"
  min_confidence: 0.65        # AI confidence threshold to act on a signal
  min_edge_boost: 0.03        # Divergence above which a signal flags a boost
  min_edge_filter: 0.10       # Adverse divergence above which it would filter an arb
  max_position_boost: 10      # Max $ per AI-boosted directional position

  news:
    lookback_hours: 4         # How far back to fetch news (max 24 for free tier)
    max_articles: 5           # Articles sent to Claude per market
    cache_ttl_minutes: 10     # Don't re-fetch news for same topic within this window
    sources: []               # Empty = NewsAPI defaults, or e.g. ["reuters", "bbc-news"]

  claude:
    model: "claude-sonnet-4-6"
    max_tokens: 512
    timeout_seconds: 8        # Skip the signal and continue if Claude is slower

# ── Agent Control API (for an external agent, e.g. OpenClaw) ──────────────────
# Exposes /api/agent for read + control. Requires AGENT_API_TOKEN env var; the
# surface is fully disabled (503) without it. Destructive actions need confirm.
agent:
  enabled: false             # Mount the /api/agent control surface
  allow_control: false       # Allow pause/kill endpoints (read-only when false)

# ── Signal Database (SQLite, append-only) ─────────────────────────────────────
# Persists signals + opportunities so AI calibration can be measured over time.
# Foundation for Kelly sizing (FEAT-05) and the backtester (FEAT-10).
database:
  enabled: false             # Set true to record signals/opportunities to SQLite
  path: "data/signals.db"
  log_signals: true
  log_opportunities: true
  auto_log_outcomes: true    # Poll Gamma API for resolutions (poller is TBD)

