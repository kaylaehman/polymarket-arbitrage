# Polymarket Arbitrage Bot Configuration
# ========================================

api:
  # Polymarket API endpoints
  polymarket_rest_url: "https://clob.polymarket.com"
  polymarket_ws_url: "wss://ws-subscriptions-clob.polymarket.com/ws/market"
  gamma_api_url: "https://gamma-api.polymarket.com"
  
  # Kalshi API endpoint (public, no auth needed for market data)
  kalshi_api_url: "https://api.elections.kalshi.com/trade-api/v2"
  
  # Polymarket CLOB API creds (OPTIONAL). If left blank they are derived
  # automatically from private_key on startup (L1 -> L2). Prefer env:
  # POLYMARKET_API_KEY / _API_SECRET / _PASSPHRASE.
  api_key: ""
  api_secret: ""
  passphrase: ""

  # Polygon wallet private key that signs orders. REQUIRED for live trading.
  # Prefer env POLYMARKET_PRIVATE_KEY over committing it here.
  private_key: "YOUR_PRIVATE_KEY_HERE"

  # Wallet type for CLOB signing: 0=EOA (default), 1=email/magic proxy, 2=browser proxy.
  # For 1/2 also set `funder` to the address that holds your USDC.
  signature_type: 0
  funder: ""

  # Kalshi trading creds (RSA key pair from Kalshi settings). Only needed to
  # place/cancel Kalshi orders; market data needs none. Prefer env
  # KALSHI_API_KEY_ID / KALSHI_PRIVATE_KEY (the latter may be a path to a .pem).
  kalshi_api_key_id: ""
  kalshi_private_key: ""

  # Polymarket.US creds (Ed25519). Prefer env POLYMARKET_US_KEY_ID / POLYMARKET_US_SECRET_KEY.
  # Leave blank to keep this venue disabled.
  polymarket_us_key_id: ""
  polymarket_us_secret_key: ""
  polymarket_us_rest_url: "https://api.polymarket.us"
  polymarket_us_gateway_url: "https://gateway.polymarket.us"

  # Request settings
  timeout_seconds: 30
  max_retries: 3
  retry_delay_seconds: 1

trading:
  # Markets to trade (empty list = auto-discover active markets)
  markets: []
  
  # Arbitrage settings
  min_edge: 0.01           # 1% edge required for bundle arbitrage
  bundle_arb_enabled: true
  
  # Market-making settings
  min_spread: 0.05         # 5c spread to act as market maker
  tick_size: 0.01          # Minimum price increment
  mm_enabled: false        # Disabled for real data (markets too efficient)
  
  # Order sizing - SMALL for $50 budget
  default_order_size: 5    # $5 per order
  min_order_size: 2        # $2 minimum
  max_order_size: 10       # $10 max per order
  
  # Execution settings
  slippage_tolerance: 0.02  # Max allowed slippage from signal to execution
  order_timeout_seconds: 60 # Cancel unfilled orders after this time
  cross_platform_max_trade_notional: 15  # Max $ across BOTH legs of one cross-platform arb

  # Kelly criterion sizing (FEAT-05) — keep false until FEAT-09 signal data
  # confirms the AI's probabilities are calibrated (miscalibrated + Kelly = ruin)
  kelly_enabled: false
  kelly_fraction: 0.25       # quarter-Kelly for reduced variance
  kelly_max_fraction: 0.10   # never risk >10% of bankroll on one market

  # Time-decay edge discounting (FEAT-07)
  time_decay_enabled: false
  skip_if_resolves_within_hours: 12   # hard skip regardless of edge
  
  # Fees (Polymarket rates - conservative estimates)
  maker_fee_bps: 0          # 0% for maker (limit orders adding liquidity)
  taker_fee_bps: 150        # 1.5% for taker (taking liquidity)
  estimated_gas_per_order: 0.02  # ~$0.02 gas on Polygon

risk:
  # Position limits - CONSERVATIVE for $50 budget
  max_position_per_market: 15    # Max $15 per market
  max_global_exposure: 50        # Max $50 total (your starting amount!)
  
  # Loss limits - tight stops
  max_daily_loss: 10             # Stop if losing $10/day
  max_drawdown_pct: 0.15         # 15% max drawdown from peak
  
  # Market filters - DISABLED for testing (volume data comes from Gamma API)
  trade_only_high_volume: false   # Disabled - we verify via Gamma API instead
  min_24h_volume: 10000           # Minimum 24h volume
  
  # Market whitelist/blacklist (optional)
  whitelist: []                  # If non-empty, only trade these markets
  blacklist: []                  # Never trade these markets
  
  # Kill switch
  kill_switch_enabled: true
  auto_unwind_on_breach: false

mode:
  # Trading mode: "live" or "dry_run"
  trading_mode: "dry_run"
  
  # Data mode: "real" or "simulation"
  # - "real": Fetch actual order books from Polymarket CLOB API
  # - "simulation": Generate fake data with opportunities (for demos/screenshots)
  data_mode: "real"  # <-- CHANGE TO "simulation" FOR DEMOS
  
  # Cross-platform arbitrage (Polymarket + Kalshi)
  cross_platform_enabled: true    # Enable cross-platform arbitrage detection
  kalshi_enabled: true            # Enable Kalshi market monitoring
  min_match_similarity: 0.6       # Minimum similarity score for market matching (0-1)
  # Hard gate: actually PLACE cross-platform orders. Stays off even in live mode
  # until explicitly enabled. Detection/alerting runs regardless.
  cross_platform_execution_enabled: true   # ARMED: new structured matcher only emits verified same-event pairs; $15/trade cap

  # Kalshi-only mode (trade Kalshi without Polymarket access):
  #   kalshi_native_enabled  - single-venue bundle arb on Kalshi (riskless, YES+NO<$1)
  #   kalshi_oracle_enabled  - directional Kalshi leg of a cross-platform gap,
  #                            using Polymarket as a price oracle (NOT riskless)
  # Both simulate in dry_run; place real Kalshi orders only when trading_mode: live.
  kalshi_native_enabled: true
  kalshi_oracle_enabled: false

  # Multi-outcome mutually-exclusive Kalshi arb (riskless underround across an
  # event's brackets — weather, FOMC, EURUSD; giant BTC/ETH ladders auto-skipped).
  # Scans every 60s, Discord-alerts each lock, and PAPER-records it (buy 1 YES on
  # every leg) into the directional store for forward P&L. Still no LIVE orders —
  # safe multi-leg live fills need all-or-nothing handling (a follow-up). Safe to
  # enable: only reads orderbooks + writes paper. Off by default.
  kalshi_multi_outcome_enabled: true

  # Polymarket.US venue. Disabled by default -- set to true + provide creds to enable.
  polymarket_us_enabled: true
  
  # Dry run settings
  dry_run_initial_balance: 10000
  simulate_fills: true
  fill_probability: 0.8          # Probability of order being filled in dry run

logging:
  # Log levels: DEBUG, INFO, WARNING, ERROR, CRITICAL
  console_level: "INFO"
  file_level: "DEBUG"
  
  # Log files
  log_dir: "logs"
  main_log_file: "bot.log"
  trades_log_file: "trades.log"
  opportunities_log_file: "opportunities.log"
  
  # Log rotation
  max_log_size_mb: 50
  backup_count: 5

monitoring:
  # Portfolio snapshot interval (seconds)
  snapshot_interval: 60

  # Heartbeat interval (seconds)
  heartbeat_interval: 30

  # Performance metrics
  track_latency: true
  track_fill_rates: true

  # Cross-platform arb monitoring loop
  cross_platform_poll_seconds: 60   # seconds between sweeps of matched pairs (rate-limit backoff)
  cross_platform_max_pairs: 25      # cap on pairs polled per sweep (rate-limit guard)

  # Kalshi-native bundle-arb loop
  kalshi_poll_seconds: 30           # seconds between sweeps of watched Kalshi markets (rate-limit backoff)
  kalshi_max_markets: 50            # cap on Kalshi markets watched (top by volume)

  # Kalshi WebSocket real-time feed
  kalshi_ws_enabled: true       # smoke-test 2: global-seq fix
  ws_staleness_seconds: 10.0        # treat WS book as stale if no update for this many seconds
  ws_reconcile_seconds: 120.0       # full REST reconcile interval while WS is running

# ── Intelligence Layer ────────────────────────────────────────────────────────
# AI news-reading layer. Disabled by default — the bot runs fully without it.
# When enabled, set NEWSAPI_KEY and ANTHROPIC_API_KEY (and optionally
# ANTHROPIC_BASE_URL for the OpenClaw proxy) as environment variables.
# Phase 2 is "annotate-only": signals are attached/logged, never block a trade.
intelligence:
  enabled: true               # ON: Claude via OpenClaw shim (ANTHROPIC_BASE_URL); NewsAPI optional
  mode: "annotate"            # annotate-only: compute+display, never filter/boost a trade
  min_confidence: 0.65        # AI confidence threshold to act on a signal
  min_edge_boost: 0.03        # Divergence above which a signal flags a boost
  min_edge_filter: 0.10       # Adverse divergence above which it would filter an arb
  max_position_boost: 10      # Max $ per AI-boosted directional position

  news:
    lookback_hours: 48        # NewsAPI /everything free tier indexes ~30d back; 4h was too tight (usually empty)
    max_articles: 5           # Articles sent to Claude per market
    cache_ttl_minutes: 10     # Don't re-fetch news for same topic within this window
    sources: []               # Empty = NewsAPI defaults, or e.g. ["reuters", "bbc-news"]

  claude:
    model: "claude-proxy/main"   # OpenClaw shim alias -> Claude Max (haiku)
    max_tokens: 512
    timeout_seconds: 8        # Skip the signal and continue if Claude is slower

# ── Agent Control API (for an external agent, e.g. OpenClaw) ──────────────────
# Exposes /api/agent for read + control. Requires AGENT_API_TOKEN env var; the
# surface is fully disabled (503) without it. Destructive actions need confirm.
agent:
  enabled: true              # Mount /api/agent (read-only; allow_control=false)
  allow_control: true        # Allow pause/kill endpoints (OpenClaw control enabled)

# ── Signal Database (SQLite, append-only) ─────────────────────────────────────
# Persists signals + opportunities so AI calibration can be measured over time.
# Foundation for Kelly sizing (FEAT-05) and the backtester (FEAT-10).
database:
  enabled: false             # Set true to record signals/opportunities to SQLite
  path: "data/signals.db"
  log_signals: true
  log_opportunities: true
  auto_log_outcomes: true    # Poll Gamma API for resolutions (poller is TBD)


# ── Directional Trading ───────────────────────────────────────────────────────
# Kalshi-only directional position-taking engine. Disabled by default.
# Paper-first: each strategy has its own mode: paper|live.
# Live execution requires EXPLICIT per-strategy mode + directional.enabled: true.
directional:
  enabled: true                   # PAPER: Kalshi data layer fixed (orderbook_fp + events-based scanner)
  db_path: data/directional.db
  scan_interval_seconds: 300      # Fix 3: 5-min interval to reduce API + AI cost per hour
  markets_per_cycle: 15           # Fix 3: 15 (was 25) to cap Claude/news API load per cycle
  min_volume: 100                 # M1: minimum 24h volume for a market to be scanned
  category_exclude: []            # e.g. [Weather, Esports]

  caps:
    total_exposure: 100000        # paper cap REMOVED 2026-06-29 (per user: maximize sample count to validate accuracy faster; PAPER/dry_run so no real-money risk)
    max_position: 8               # max USD per individual position
    max_open: 100000              # count cap off
    max_open_longshot: 100000     # longshot bucket cap off too — accumulate macro/cable/sports samples as fast as weather

  safe_compounder:
    mode: paper                   # paper | live (live requires enabled: true above)
    min_edge_cents: 3.0
    skip_categories: []

  ai_directional:
    mode: paper                   # paper | live
    min_confidence: 0.65
    min_edge_pct: 0.05
    kelly_fraction: 0.25
    stop_loss_pct: 0.30
    take_profit_pct: 0.50
    max_hold_hours: 72.0
    max_days_to_resolution: 45    # skip markets closing more than 45 days out (avoids wasted Claude/NewsAPI calls)
    categories: []                # restrict to these categories; empty = no restriction (e.g. [Politics, Finance])

  maker_longshot:
    mode: paper                   # paper | live (paper until positive expectancy validated)
    min_structural_score: 0.02    # minimum structural_score(yes_mid, "NO", category) to emit
    min_yes_price: 0.05           # floor on yes_mid -> skip NO > 0.95 (avoid fat-tail extremes)
    max_yes_price: 0.15           # backtest-tuned (115-trade sample): NO band [0.85, 0.95], best EV
    price_improvement_cents: 1    # cents below no_ask to post the resting NO BUY limit
    order_ttl_minutes: 60.0       # cancel unfilled live orders older than this
    skip_categories: []           # e.g. [Sports, Entertainment]
    max_days_to_resolution: 30    # near-term focus: tightened from 90 to 30 days

  # ── Priority Series ────────────────────────────────────────────────────────
  # The /events endpoint is dominated by KXMV parlays + long-dated politics and
  # rarely surfaces weather or near-term macro markets.  The 115-trade backtest
  # found ~83 % of longshot edge in KXHIGHNY and the macro series below.
  #
  # For each series here the scanner calls the series-scoped endpoint
  # (?series_ticker=S&status=open), keeps markets closing within
  # scanner.max_days_to_resolution, and MERGES them into the probe universe.
  # The existing /events scan is UNCHANGED; this is purely additive.
  # Set to [] to disable.
  scanner:
    priority_series:
      # Weather: daily-high temperature series (city tickers confirmed on Kalshi)
      - KXHIGHNY    # New York — dominant longshot edge source in backtest
      - KXHIGHCHI   # Chicago
      - KXHIGHLAX   # Los Angeles
      - KXHIGHMIA   # Miami
      - KXHIGHAUS   # Austin   (added 2026-06-24 — daily resolution, more samples)
      - KXHIGHDEN   # Denver   (added 2026-06-24)
      - KXHIGHPHIL  # Philadelphia (added 2026-06-24)
      # Macro: economic-release series validated in the 115-trade backtest
      - KXCPI         # US CPI (month-on-month)
      - KXCPIYOY      # US CPI (year-on-year)
      - KXCPICORE     # US Core CPI
      - KXPCECORE     # US Core PCE
      - KXGDP         # US GDP
      - KXFEDDECISION # FOMC rate decision
      # Financial: Kalshi crypto/commodity/forex series
      - KXBTCD      # Bitcoin daily close threshold
      - KXBTC       # Bitcoin price range
      - KXETHD      # Ethereum daily close threshold
      - KXETH       # Ethereum price range
      - KXWTI       # WTI crude oil
      - KXEURUSD    # EUR/USD forex
      # Sports futures: NBA/NHL championship + conference. PAPER forward-tracking only;
      # structural longshot-NO bias is UNVALIDATED on 1 season (backtest p=0.15). Note: these
      # resolve far out, so the 30d scanner/maker horizon only admits them near season-end.
      - KXNBA         # NBA champion
      - KXNHL         # NHL champion (Stanley Cup)
      - KXNBAEAST     # NBA Eastern Conference
      - KXNBAWEST     # NBA Western Conference
      - KXNHLEAST     # NHL Eastern Conference
      - KXNHLWEST     # NHL Western Conference
      # In-season per-game / series (daily-ish resolution; admitted by consensus_divergence, not longshot)
      - KXMLBGAME     # MLB per-game money line (84 open within 30d as of 2026-06-29)
      - KXMLB         # MLB series/division futures
      - KXWNBA        # WNBA (in season)
      # Macro extras validated as in-window monthly releases
      - KXU3          # Unemployment rate
      - KXPAYROLLS    # Nonfarm payrolls
    max_days_to_resolution: 30  # only include series markets closing within N days
    # Sports CHAMPIONSHIP futures resolve far out; admit them up to this horizon so
    # they're scanned when a season is active (NBA/NHL playoffs). Non-futures keep the 30d cap.
    priority_series_sports_max_days: 220

  # ── Weather forecast gate ───────────────────────────────────────────────────
  # Enables NWS forecast gating for KXHIGH* T-type longshot NO bets.
  # Uses api.weather.gov (keyless, free).  Additive: only affects weather-series
  # candidates; macro/non-weather candidates pass through unchanged.
  #
  # Confirmed resolution stations (2026-06-22):
  #   KXHIGHNY  -> Central Park, NY          (40.7829, -73.9654)
  #   KXHIGHCHI -> Chicago Midway Airport    (41.7868, -87.7522)
  #   KXHIGHLAX -> Los Angeles Airport       (33.9425, -118.4081)
  #   KXHIGHMIA -> Miami International       (25.7959, -80.2870)
  weather:
    enabled: true
    safe_margin_f: 4.0           # forecast must be >= 4F below threshold to KEEP NO bet
    forecast_horizon_days: 7     # NWS forecasts ~7 days out; skip gate beyond this
    require_forecast: true       # skip weather candidate if NWS unavailable (vs bet blind)

  # ── Alpha Vantage financial gate ──────────────────────────────────────────
  # Z-score gate for KXBTC*/KXETH*/KXWTI/KXEURUSD T-type threshold markets.
  # Requires ALPHAVANTAGE_API_KEY env var; free tier = 25 calls/day.
  # min_sigma: skip NO bet if threshold is within min_sigma expected-moves of
  #   current price.  require_data: skip when AV unavailable (vs bet blind).
  financial:
    enabled: true
    min_sigma: 2.5
    price_ttl_minutes: 240
    vol_ttl_hours: 24
    horizon_days: 14
    require_data: true
    max_calls_per_day: 20
    max_price_age_days: 3
    underlyings:
      BTC: CURRENCY_EXCHANGE_RATE
      ETH: CURRENCY_EXCHANGE_RATE
      WTI: WTI
      EURUSD: CURRENCY_EXCHANGE_RATE

  pmus_weather:
    enabled: true                 # gate the PM.US weather market source
    max_days: 30.0               # only fetch markets resolving within N days
    cache_ttl_seconds: 300.0     # PM.US fetch cache TTL (seconds)

  # ── Macro nowcast gate (CPI/PCE/GDP) ─────────────────────────────────────────
  # Keeps a NO longshot only when the Kalshi bucket/threshold is >= min_sigma σ
  # from the Federal Reserve nowcast (Cleveland Fed CPI/PCE, GDPNow via FRED).
  # Mirrors the weather/financial gates. Default OFF until paper-validated.
  # Needs FRED_API_KEY in .env for GDPNow (free: fredaccount.stlouisfed.org/apikeys).
  macro:
    enabled: true
    min_sigma: 2.0
    require_data: true            # skip (don't bet blind) when nowcast unavailable
    horizon_days: 45
    sigma:                        # per-indicator surprise σ (percentage points)
      CPI: 0.10
      CPIYOY: 0.12
      CPICORE: 0.10
      PCECORE: 0.10
      GDP: 0.40

  # ── Sports consensus gate (championship futures) ─────────────────────────────
  # Keeps a NO longshot only when the de-vigged bookmaker CONSENSUS (The Odds API
  # outrights) also says the team is a longshot (<= max_prob). Needs ODDS_API_KEY
  # in .env (free 500 credits/month). Caps daily calls + caches to stay under.
  sports:
    enabled: true
    max_prob: 0.10
    require_data: true
    cache_ttl_hours: 12.0
    max_calls_per_day: 12

  # Consensus-divergence: paper directional bets on ~50/50 markets where a knowledge
  # gate (sports book consensus / macro nowcast) disagrees with the market price.
  # Complements maker_longshot (longshot-NO only). PAPER only.
  consensus_divergence:
    enabled: true
    min_divergence: 0.12        # required |gate_prob - market_prob| to act
    max_yes_price: 0.95
    min_yes_price: 0.05
    skip_categories: []

  # Music: route music_intel chart-edge signals into the paper book (settles via
  # Gamma resolution; see music_intel/). PAPER only; never trades.
  music_paper:
    enabled: true
    charts: ["spotify_us_daily"]
    min_refresh_seconds: 1800   # throttle kworb scrape to ~hourly (politeness)


# ── Alerts ────────────────────────────────────────────────────────────────────
# Push trade/kill-switch/position events to Discord and/or Telegram.
# Disabled by default — zero behavior change unless you set enabled: true.
# Secrets (webhook URL / tokens) go in .env (gitignored), NOT here:
#   ALERT_DISCORD_WEBHOOK=https://discord.com/api/webhooks/...
#   ALERT_TELEGRAM_BOT_TOKEN=123456:ABC...
#   ALERT_TELEGRAM_CHAT_ID=-100123456789
alerts:
  enabled: true                   # ON 2026-06-29 — Discord #trading place + settle notifications
  cooldown_seconds: 60.0          # Min seconds between same (event_type, market) alerts
  min_severity: "info"            # Minimum severity to send: info | warn | critical


# ── Catalyst Targeting ────────────────────────────────────────────────────────
# Prioritise markets near scheduled economic/political catalysts in the scanner.
# Disabled by default — zero behavior change unless enabled: true.
# Edit the calendar list below to match upcoming events.
catalyst:
  enabled: false
  window_hours: 72.0              # Look ahead this many hours for catalyst proximity
  # User-editable calendar. Each entry: name, date (ISO 8601), keywords (list).
  # The keywords are case-insensitive substrings matched against market title/category.
  calendar:
    # - name: "FOMC Meeting"
    #   date: "2026-07-29T14:00:00"
    #   keywords: ["FOMC", "federal reserve", "rate", "interest rate"]
    # - name: "CPI Release"
    #   date: "2026-07-15T08:30:00"
    #   keywords: ["CPI", "inflation", "consumer price"]
    # - name: "Jobs Report"
    #   date: "2026-08-07T08:30:00"
    #   keywords: ["jobs", "nonfarm payroll", "employment", "unemployment"]

# ── Music chart intelligence module (music_intel/) ──────────────────────────
# Self-contained, ALERT-ONLY. Disabled by default. See music_intel/README.md.
# This module never trades (ENABLE_CHART_EXECUTION is a future-seam, never flipped).
music_intel:
  enabled: false              # master switch (module is dormant until true)
  charts: [hot100, billboard200]
  # projection heuristics (Billboard's exact coefficients are NOT public — tunable)
  stream_eu: 1250.0           # paid streams per chart unit
  sale_eu: 1.0
  airplay_per_unit: 0.0       # 0 until an airplay feed is wired
  margin_k: 12.0              # logistic steepness: unit-margin -> P(#1)
  # politeness
  request_min_interval_s: 2.0
  daily_call_cap: 500
  alerts_enabled: true
  edge:
    base_threshold: 0.05      # min net edge at full confidence
    threshold_conf_scale: 0.15  # extra edge demanded as confidence -> 0
    confidence_floor: 0.25
    min_liquidity: 100.0
    max_days_to_resolution: 120.0
    fee: 0.02
    slippage: 0.01
